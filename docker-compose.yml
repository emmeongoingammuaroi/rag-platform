services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: rag-platform-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_rag_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-platform-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: rag-platform-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-platform-network

  # MinIO Object Storage (S3-compatible)
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: rag-platform-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-platform-network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:v1.12.6
    container_name: rag-platform-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-platform-network

  # FastAPI Application
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${RAG_PLATFORM_IMAGE:-ghcr.io/your-org/rag-platform-api}:${RAG_PLATFORM_TAG:-latest}
    container_name: rag-platform-api
    ports:
      - "127.0.0.1:8010:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/ai_rag_db
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET_NAME=documents
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
    networks:
      - rag-platform-network
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${RAG_PLATFORM_IMAGE:-ghcr.io/your-org/rag-platform-api}:${RAG_PLATFORM_TAG:-latest}
    container_name: rag-platform-celery-worker
    command: ["celery", "-A", "app.core.celery_app.celery_app", "worker", "--loglevel=INFO", "--without-heartbeat", "--without-mingle"]
    stop_grace_period: 30s
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/ai_rag_db
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET_NAME=documents
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
    networks:
      - rag-platform-network
    restart: unless-stopped

  # Vite + React Frontend
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: dev
    container_name: rag-platform-web
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8010
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
      - ./web/index.html:/app/index.html
      - /app/node_modules
    depends_on:
      - api
    networks:
      - rag-platform-network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:

networks:
  rag-platform-network:
    driver: bridge
