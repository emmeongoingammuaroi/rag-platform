services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: rag-platform-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_rag_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-platform-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: rag-platform-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-platform-network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-platform-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    networks:
      - rag-platform-network

  # FastAPI Application
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${RAG_PLATFORM_IMAGE:-ghcr.io/your-org/rag-platform-api}:${RAG_PLATFORM_TAG:-latest}
    container_name: rag-platform-api
    ports:
      - "127.0.0.1:8010:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/ai_rag_db
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - STORAGE_DIR=/app/storage
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - qdrant
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/storage:/app/storage
    networks:
      - rag-platform-network
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${RAG_PLATFORM_IMAGE:-ghcr.io/your-org/rag-platform-api}:${RAG_PLATFORM_TAG:-latest}
    container_name: rag-platform-celery-worker
    command: ["celery", "-A", "app.core.celery_app.celery_app", "worker", "--loglevel=INFO"]
    healthcheck:
      disable: true
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/ai_rag_db
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - STORAGE_DIR=/app/storage
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - qdrant
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/storage:/app/storage
    networks:
      - rag-platform-network
    restart: unless-stopped

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${RAG_PLATFORM_IMAGE:-ghcr.io/your-org/rag-platform-api}:${RAG_PLATFORM_TAG:-latest}
    container_name: rag-platform-celery-beat
    command: ["celery", "-A", "app.core.celery_app.celery_app", "beat", "--loglevel=INFO"]
    healthcheck:
      disable: true
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/ai_rag_db
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - STORAGE_DIR=/app/storage
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/storage:/app/storage
    networks:
      - rag-platform-network
    restart: unless-stopped

  # Vite + React Frontend
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: dev
    container_name: rag-platform-web
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8010
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
      - ./web/index.html:/app/index.html
      - /app/node_modules
    depends_on:
      - api
    networks:
      - rag-platform-network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  rag-platform-network:
    driver: bridge
